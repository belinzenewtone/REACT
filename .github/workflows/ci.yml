name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  js:
    name: Typecheck · Gates · JS tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Architecture gates
        run: node scripts/gates.js

      - name: JS unit tests
        run: npx jest --ci --coverage=false

  parser:
    name: Kotlin parser tests (167-fixture corpus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # android/ is gitignored (generated) — produce it so Gradle can build
      # the lifeos-sms library module and run its unit tests.
      - name: Expo prebuild (android)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: '1'

      - name: Parser unit tests
        working-directory: android
        run: ./gradlew :lifeos-sms:testDebugUnitTest --no-daemon

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: parser-test-report
          path: modules/lifeos-sms/android/build/reports/tests/
